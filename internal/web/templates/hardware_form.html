{{define "content"}}
<h1>{{.Heading}}</h1>
{{if .Error}}<div class="error">{{.Error}}</div>{{end}}
<form class="stack" method="post" action="{{.Action}}">
{{ csrfField }}
  <label>Name<input name="name" value="{{.Item.Name}}" required></label>
  <label>Kind<input name="kind" value="{{.Item.Kind}}" placeholder="ups, switch, disk, nas…"></label>
  <label>Manufacturer<input name="manufacturer" value="{{.Item.Manufacturer}}" placeholder="APC"></label>
  <label>Model<input name="model" value="{{.Item.Model}}" placeholder="Smart-UPS 1500"></label>
  <label>Serial<input name="serial" value="{{.Item.Serial}}"></label>
  <label>Location<input name="location" value="{{.Item.Location}}" placeholder="rack-1"></label>
  <label>Purchase date<input type="date" name="purchase_date" value="{{.Item.PurchaseDate}}"></label>
  <label>Warranty end<input type="date" name="warranty_end" value="{{.Item.WarrantyEnd}}"></label>
  <label>Status<input name="status" value="{{.Item.Status}}" placeholder="active, spare, retired"></label>
  <label>Notes<textarea name="notes">{{.Item.Notes}}</textarea></label>
  <div class="actions">
    <button class="btn btn-primary" type="submit">{{.SubmitLabel}}</button>
    <a class="btn" href="/hardware">Cancel</a>
  </div>
</form>
{{end}}
