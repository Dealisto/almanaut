<!doctype html>
<title>Almanaut — Hosts</title>
<h1>Hosts</h1>
<p><a href="/hosts/new">+ New host</a></p>
<table border="1" cellpadding="6">
  <thead>
    <tr><th>Name</th><th>Type</th><th>OS</th><th>IPs</th><th>Status</th><th></th></tr>
  </thead>
  <tbody>
    {{range .Hosts}}
    <tr>
      <td>{{.Name}}</td>
      <td>{{.Type}}</td>
      <td>{{.OS}}</td>
      <td>{{range $i, $ip := .IPs}}{{if $i}}, {{end}}{{$ip}}{{end}}</td>
      <td>{{.Status}}</td>
      <td>
        <form method="post" action="/hosts/{{.ID}}/delete"
              onsubmit="return confirm('Delete this host?');">
          <button type="submit">Delete</button>
        </form>
      </td>
    </tr>
    {{else}}
    <tr><td colspan="6"><em>No hosts yet.</em></td></tr>
    {{end}}
  </tbody>
</table>
