{{define "content"}}
<h1>Hosts</h1>
<div class="toolbar"><a class="btn btn-primary" href="/hosts/new">+ New host</a></div>
{{if .Hosts}}
<div class="table-wrap">
<table>
  <thead><tr><th>Name</th><th>Type</th><th>OS</th><th>IPs</th><th>Status</th><th></th></tr></thead>
  <tbody>
  {{range .Hosts}}
    <tr>
      <td>{{.Name}}</td>
      <td>{{.Type}}</td>
      <td>{{.OS}}</td>
      <td>{{range $i, $ip := .IPs}}{{if $i}}, {{end}}{{$ip}}{{end}}</td>
      <td>{{.Status}}</td>
      <td>
        <a class="btn" href="/hosts/{{.ID}}/edit">Edit</a>
        <form class="form-inline" method="post" action="/hosts/{{.ID}}/delete"
              onsubmit="return confirm('Delete this host?');">
          <button class="btn btn-danger" type="submit">Delete</button>
        </form>
      </td>
    </tr>
  {{end}}
  </tbody>
</table>
</div>
{{else}}
<div class="table-wrap"><div class="empty">No hosts yet.</div></div>
{{end}}
{{end}}
