{{define "content"}}
<div class="page-header">
  <div class="ph-titles">
    <span class="ph-eyebrow">Inventory</span>
    <h1>{{.Heading}}</h1>
  </div>
</div>
{{if .Error}}<div class="error">{{.Error}}</div>{{end}}
<form class="stack" method="post" action="{{.Action}}">
{{ csrfField }}
  <label>Name<input name="name" value="{{.Item.Name}}" required></label>
  <label>Kind
    <select name="kind">
      {{range .Extras.Kinds}}<option value="{{.}}" {{if eq . $.Item.Kind}}selected{{end}}>{{.}}</option>{{end}}
    </select>
  </label>
  <label>Access URL<input name="url" value="{{.Item.URL}}"></label>
  <label>Ports<input name="ports" value="{{.Item.Ports}}"></label>
  <label>Category<input name="category" value="{{.Item.Category}}"></label>
  <label>Notes<textarea name="notes">{{.Item.Notes}}</textarea></label>
  {{template "customFieldsForm" .Extras.customFields}}
  <div class="actions">
    <button class="btn btn-primary" type="submit">{{.SubmitLabel}}</button>
    <a class="btn" href="/services">Cancel</a>
  </div>
</form>
{{end}}
