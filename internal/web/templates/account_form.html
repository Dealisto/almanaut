{{define "content"}}
<h1>{{.Heading}}</h1>
{{if .Error}}<div class="error">{{.Error}}</div>{{end}}
<p style="color:var(--muted)">Never store passwords or keys here — record where the secret lives (your password manager) and point to it.</p>
<form class="stack" method="post" action="{{.Action}}">
{{ csrfField }}
  <label>Name<input name="name" value="{{.Item.Name}}" required></label>
  <label>Kind<input name="kind" value="{{.Item.Kind}}" placeholder="admin, service account, API, SSH key…"></label>
  <label>Username<input name="username" value="{{.Item.Username}}" placeholder="admin, root@pam…"></label>
  <label>Password manager<input name="password_manager" value="{{.Item.PasswordManager}}" placeholder="Bitwarden, 1Password, KeePass…"></label>
  <label>Secret reference<input name="secret_ref" value="{{.Item.SecretRef}}" placeholder="Homelab &gt; Proxmox, vault path…"></label>
  <label>URL<input name="url" value="{{.Item.URL}}" placeholder="https://…"></label>
  <label>Status<input name="status" value="{{.Item.Status}}" placeholder="active, disabled"></label>
  <label>Notes<textarea name="notes">{{.Item.Notes}}</textarea></label>
  <div class="actions">
    <button class="btn btn-primary" type="submit">{{.SubmitLabel}}</button>
    <a class="btn" href="/accounts">Cancel</a>
  </div>
</form>
{{end}}
