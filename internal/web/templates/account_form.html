{{define "content"}}
<h1>{{.Heading}}</h1>
{{if .Error}}<div class="error">{{.Error}}</div>{{end}}
<p style="color:var(--muted)">Never store passwords or keys here — record where the secret lives (your password manager) and point to it.</p>
<form class="stack" method="post" action="{{.Action}}">
  <label>Name<input name="name" value="{{.Account.Name}}" required></label>
  <label>Kind<input name="kind" value="{{.Account.Kind}}" placeholder="admin, service account, API, SSH key…"></label>
  <label>Username<input name="username" value="{{.Account.Username}}" placeholder="admin, root@pam…"></label>
  <label>Password manager<input name="password_manager" value="{{.Account.PasswordManager}}" placeholder="Bitwarden, 1Password, KeePass…"></label>
  <label>Secret reference<input name="secret_ref" value="{{.Account.SecretRef}}" placeholder="Homelab &gt; Proxmox, vault path…"></label>
  <label>URL<input name="url" value="{{.Account.URL}}" placeholder="https://…"></label>
  <label>Status<input name="status" value="{{.Account.Status}}" placeholder="active, disabled"></label>
  <label>Notes<textarea name="notes">{{.Account.Notes}}</textarea></label>
  <div class="actions">
    <button class="btn btn-primary" type="submit">{{.SubmitLabel}}</button>
    <a class="btn" href="/accounts">Cancel</a>
  </div>
</form>
{{end}}
