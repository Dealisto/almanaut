{{define "content"}}
<div class="page-header">
  <div class="ph-titles">
    <span class="ph-eyebrow">Infrastructure</span>
    <h1>{{.Heading}}</h1>
  </div>
</div>
{{if .Error}}<div class="error">{{.Error}}</div>{{end}}
<form class="stack" method="post" action="{{.Action}}">
{{ csrfField }}
  <label>Name<input name="name" value="{{.Item.Name}}" required></label>
  <label>VLAN ID<input type="number" name="vid" min="1" max="4094" value="{{if .Item.VID}}{{.Item.VID}}{{end}}" required></label>
  <label>Notes<textarea name="notes">{{.Item.Notes}}</textarea></label>
  {{template "customFieldsForm" .Extras.customFields}}
  <div class="actions">
    <button class="btn btn-primary" type="submit">{{.SubmitLabel}}</button>
    <a class="btn" href="/vlans">Cancel</a>
  </div>
</form>
{{end}}
