{{define "content"}}
<div class="page-header">
  <div class="ph-titles">
    <span class="ph-eyebrow">Inventory</span>
    <h1>{{.Heading}}</h1>
  </div>
</div>
{{if .Error}}<div class="error">{{.Error}}</div>{{end}}
<form class="stack" method="post" action="{{.Action}}">
{{ csrfField }}
  <label>Name<input name="name" value="{{.Item.Name}}" required></label>
  <label>CIDR<input name="cidr" value="{{.Item.CIDR}}" placeholder="10.0.0.0/24" required></label>
  <label>VLAN
    <select name="vlan_id">
      <option value="0">— none —</option>
      {{range .Extras.VLANs}}<option value="{{.ID}}"{{if eq .ID $.Item.VLANID}} selected{{end}}>VLAN {{.VID}} ({{.Name}})</option>{{end}}
    </select>
  </label>
  <label>Gateway<input name="gateway" value="{{.Item.Gateway}}"></label>
  <label>Notes<textarea name="notes">{{.Item.Notes}}</textarea></label>
  <div class="actions">
    <button class="btn btn-primary" type="submit">{{.SubmitLabel}}</button>
    <a class="btn" href="/networks">Cancel</a>
  </div>
</form>
{{end}}
