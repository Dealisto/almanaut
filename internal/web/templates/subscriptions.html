{{define "content"}}
<h1>Subscriptions</h1>
<div class="toolbar"><a class="btn btn-primary" href="/subscriptions/new">+ New subscription</a></div>
{{if .Items}}
<div class="table-wrap">
<table>
  <thead><tr><th>Name</th><th>Kind</th><th>Provider</th><th>Amount</th><th>Cycle</th><th>Renewal</th><th></th></tr></thead>
  <tbody>
  {{range .Items}}
    <tr>
      <td><a href="/subscriptions/{{.ID}}">{{.Name}}</a></td>
      <td>{{.Kind}}</td>
      <td>{{.Provider}}</td>
      <td>{{.Amount}}{{if .Currency}} {{.Currency}}{{end}}</td>
      <td>{{.BillingCycle}}</td>
      <td>{{.RenewalDate}}</td>
      <td>
        <a class="btn" href="/subscriptions/{{.ID}}/edit">Edit</a>
        <form class="form-inline" method="post" action="/subscriptions/{{.ID}}/delete"
              onsubmit="return confirm('Delete this subscription?');">
          <button class="btn btn-danger" type="submit">Delete</button>
        </form>
      </td>
    </tr>
  {{end}}
  </tbody>
</table>
</div>
{{else}}
<div class="table-wrap"><div class="empty">No subscriptions yet.</div></div>
{{end}}
{{end}}
