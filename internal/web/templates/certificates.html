{{define "content"}}
<div class="page-header">
  <div class="ph-titles">
    <span class="ph-eyebrow">Inventory</span>
    <h1>Certificates</h1>
  </div>
  <div class="ph-actions">
    <a class="btn btn-primary" href="/certificates/new">+ New certificate</a>
  </div>
</div>
{{if .Items}}
<div class="table-wrap">
<table>
  <thead><tr><th>Subject</th><th>Issuer</th><th>Expires</th><th>Auto-renew</th><th></th></tr></thead>
  <tbody>
  {{range .Items}}
    <tr>
      <td><a href="/certificates/{{.ID}}">{{.Subject}}</a></td>
      <td>{{.Issuer}}</td>
      <td>{{.ExpiresOn}}</td>
      <td>{{if .AutoRenew}}yes{{else}}no{{end}}</td>
      <td>
        <a class="btn" href="/certificates/{{.ID}}/edit">Edit</a>
        <form class="form-inline" method="post" action="/certificates/{{.ID}}/delete"
              onsubmit="return confirm('Delete this certificate?');">
          {{ csrfField }}
          <button class="btn btn-danger" type="submit">Delete</button>
        </form>
      </td>
    </tr>
  {{end}}
  </tbody>
</table>
</div>
{{else}}
<div class="table-wrap"><div class="empty">No certificates yet.</div></div>
{{end}}
{{end}}
