{{define "content"}}
<div class="page-header">
  <div class="ph-titles">
    <span class="ph-eyebrow">Infrastructure</span>
    <h1>{{.Heading}}</h1>
  </div>
</div>
{{if .Error}}<div class="error">{{.Error}}</div>{{end}}
<form class="stack" method="post" action="{{.Action}}">
{{ csrfField }}
  <label>Name<input name="name" value="{{.Item.Name}}" required></label>
  <label>Network
    <select name="network_id">
      <option value="0">— none —</option>
      {{range .Extras.Networks}}<option value="{{.ID}}"{{if eq .ID $.Item.NetworkID}} selected{{end}}>{{.Name}} ({{.CIDR}})</option>{{end}}
    </select>
  </label>
  <label>Start IP<input name="start_ip" value="{{.Item.StartIP}}" placeholder="10.0.0.100"></label>
  <label>End IP<input name="end_ip" value="{{.Item.EndIP}}" placeholder="10.0.0.150"></label>
  <label>Notes<textarea name="notes">{{.Item.Notes}}</textarea></label>
  {{template "customFieldsForm" .Extras.customFields}}
  <div class="actions">
    <button class="btn btn-primary" type="submit">{{.SubmitLabel}}</button>
    <a class="btn" href="/reservations">Cancel</a>
  </div>
</form>
{{end}}
