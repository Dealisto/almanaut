{{define "content"}}
<div class="page-header">
  <div class="ph-titles">
    <span class="ph-eyebrow">Inventory</span>
    <h1>Networks</h1>
  </div>
  <div class="ph-actions">
    {{if canWrite}}<a class="btn btn-primary" href="/networks/new">+ New network</a>{{end}}
  </div>
</div>
{{template "listcontrols" .Controls}}
{{if .Items}}
<div class="table-wrap">
<table>
  <thead><tr><th>Name</th><th>CIDR</th><th>Gateway</th><th></th></tr></thead>
  <tbody>
  {{range .Items}}
    <tr>
      <td><a href="/networks/{{.ID}}">{{.Name}}</a></td>
      <td>{{.CIDR}}</td>
      <td>{{.Gateway}}</td>
      <td>
        {{if canWrite}}
        <a class="btn" href="/networks/{{.ID}}/edit">Edit</a>
        <form class="form-inline" method="post" action="/networks/{{.ID}}/delete"
              onsubmit="return confirm('Delete this network?');">
          {{ csrfField }}
          <button class="btn btn-danger" type="submit">Delete</button>
        </form>
        {{end}}
      </td>
    </tr>
  {{end}}
  </tbody>
</table>
</div>
{{else}}
<div class="table-wrap"><div class="empty">No networks yet.</div></div>
{{end}}
{{end}}
