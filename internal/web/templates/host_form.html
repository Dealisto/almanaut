{{define "content"}}
<h1>{{.Heading}}</h1>
{{if .Error}}<div class="error">{{.Error}}</div>{{end}}
<form class="stack" method="post" action="{{.Action}}">
  <label>Name<input name="name" value="{{.Host.Name}}" required></label>
  <label>Type
    <select name="type">
      {{range .Types}}<option value="{{.}}" {{if eq . $.Host.Type}}selected{{end}}>{{.}}</option>{{end}}
    </select>
  </label>
  <label>OS<input name="os" value="{{.Host.OS}}"></label>
  <label>IPs (comma-separated)<input name="ips" value="{{range $i, $ip := .Host.IPs}}{{if $i}}, {{end}}{{$ip}}{{end}}"></label>
  <label>Status<input name="status" value="{{.Host.Status}}"></label>
  <label>Notes<textarea name="notes">{{.Host.Notes}}</textarea></label>
  <div class="actions">
    <button class="btn btn-primary" type="submit">{{.SubmitLabel}}</button>
    <a class="btn" href="/hosts">Cancel</a>
  </div>
</form>
{{end}}
