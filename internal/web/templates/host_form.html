{{define "content"}}
<div class="page-header">
  <div class="ph-titles">
    <span class="ph-eyebrow">Inventory</span>
    <h1>{{.Heading}}</h1>
  </div>
</div>
{{if .Error}}<div class="error">{{.Error}}</div>{{end}}
<form class="stack" method="post" action="{{.Action}}">
{{ csrfField }}
  <label>Name<input name="name" value="{{.Item.Name}}" required></label>
  <label>Type
    <select name="type">
      {{range .Extras.Types}}<option value="{{.}}" {{if eq . $.Item.Type}}selected{{end}}>{{.}}</option>{{end}}
    </select>
  </label>
  <label>OS<input name="os" value="{{.Item.OS}}"></label>
  <label>CPU<input name="cpu" value="{{.Item.CPU}}"></label>
  <label>RAM<input name="ram" value="{{.Item.RAM}}"></label>
  <label>Disk<input name="disk" value="{{.Item.Disk}}"></label>
  <label>IPs (comma-separated)<input name="ips" value="{{range $i, $ip := .Item.IPs}}{{if $i}}, {{end}}{{$ip}}{{end}}"></label>
  <label>Status<input name="status" value="{{.Item.Status}}"></label>
  <label>Notes<textarea name="notes">{{.Item.Notes}}</textarea></label>
  <label>Rack
    <select name="rack_id">
      <option value="0">— none —</option>
      {{range .Extras.Racks}}<option value="{{.ID}}"{{if eq .ID $.Item.RackID}} selected{{end}}>{{.Name}}</option>{{end}}
    </select>
  </label>
  <label>Rack position (U)<input type="number" name="rack_position" min="0" value="{{.Item.RackPosition}}"></label>
  <label>Height (U)<input type="number" name="u_height" min="1" value="{{.Item.UHeight}}"></label>
  <div class="actions">
    <button class="btn btn-primary" type="submit">{{.SubmitLabel}}</button>
    <a class="btn" href="/hosts">Cancel</a>
  </div>
</form>
{{end}}
