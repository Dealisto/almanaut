{{define "content"}}
<div class="page-header">
  <div class="ph-titles">
    <span class="ph-eyebrow">Infrastructure</span>
    <h1>VLANs</h1>
  </div>
  <div class="ph-actions">
    {{if canWrite}}<a class="btn btn-primary" href="/vlans/new">+ New VLAN</a>{{end}}
  </div>
</div>
{{if .Items}}
<div class="table-wrap">
<table>
  <thead><tr><th>VLAN ID</th><th>Name</th><th></th></tr></thead>
  <tbody>
  {{range .Items}}
    <tr>
      <td><a href="/vlans/{{.ID}}">{{.VID}}</a></td>
      <td>{{.Name}}</td>
      <td>
        {{if canWrite}}
        <a class="btn" href="/vlans/{{.ID}}/edit">Edit</a>
        <form class="form-inline" method="post" action="/vlans/{{.ID}}/delete"
              onsubmit="return confirm('Delete this VLAN?');">
          {{ csrfField }}
          <button class="btn btn-danger" type="submit">Delete</button>
        </form>
        {{end}}
      </td>
    </tr>
  {{end}}
  </tbody>
</table>
</div>
{{else}}
<div class="table-wrap"><div class="empty">No VLANs yet.</div></div>
{{end}}
{{end}}
