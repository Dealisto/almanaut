{{define "content"}}
<div class="page-header">
  <div class="ph-titles">
    <span class="ph-eyebrow">Infrastructure</span>
    <h1>Racks</h1>
  </div>
  <div class="ph-actions">
    <a class="btn btn-primary" href="/racks/new">+ New rack</a>
  </div>
</div>
{{if .Items}}
<div class="table-wrap">
<table>
  <thead><tr><th>Name</th><th>Height (U)</th><th></th></tr></thead>
  <tbody>
  {{range .Items}}
    <tr>
      <td><a href="/racks/{{.ID}}">{{.Name}}</a></td>
      <td>{{.UHeight}}</td>
      <td>
        <a class="btn" href="/racks/{{.ID}}/edit">Edit</a>
        <form class="form-inline" method="post" action="/racks/{{.ID}}/delete"
              onsubmit="return confirm('Delete this rack?');">
          {{ csrfField }}
          <button class="btn btn-danger" type="submit">Delete</button>
        </form>
      </td>
    </tr>
  {{end}}
  </tbody>
</table>
</div>
{{else}}
<div class="table-wrap"><div class="empty">No racks yet.</div></div>
{{end}}
{{end}}
