{{define "content"}}
<div class="page-header">
  <div class="ph-titles">
    <span class="ph-eyebrow">Inventory</span>
    <h1>Domains</h1>
  </div>
  <div class="ph-actions">
    {{if canWrite}}<a class="btn btn-primary" href="/domains/new">+ New domain</a>{{end}}
  </div>
</div>
{{if .Items}}
<div class="table-wrap">
<table>
  <thead><tr><th>FQDN</th><th>Provider</th><th></th></tr></thead>
  <tbody>
  {{range .Items}}
    <tr>
      <td><a href="/domains/{{.ID}}">{{.FQDN}}</a></td>
      <td>{{.Provider}}</td>
      <td>
        {{if canWrite}}
        <a class="btn" href="/domains/{{.ID}}/edit">Edit</a>
        <form class="form-inline" method="post" action="/domains/{{.ID}}/delete"
              onsubmit="return confirm('Delete this domain?');">
          {{ csrfField }}
          <button class="btn btn-danger" type="submit">Delete</button>
        </form>
        {{end}}
      </td>
    </tr>
  {{end}}
  </tbody>
</table>
</div>
{{else}}
<div class="table-wrap"><div class="empty">No domains yet.</div></div>
{{end}}
{{end}}
