{{define "content"}}
<div class="page-header">
  <div class="ph-titles">
    <span class="ph-eyebrow">Inventory</span>
    <h1>{{.Heading}}</h1>
  </div>
</div>
{{if .Error}}<div class="error">{{.Error}}</div>{{end}}
<form class="stack" method="post" action="{{.Action}}">
{{ csrfField }}
  <label>FQDN<input name="fqdn" value="{{.Item.FQDN}}" placeholder="jellyfin.example.com" required></label>
  <label>DNS provider<input name="provider" value="{{.Item.Provider}}"></label>
  <label>Notes<textarea name="notes">{{.Item.Notes}}</textarea></label>
  {{template "customFieldsForm" .Extras.customFields}}
  <div class="actions">
    <button class="btn btn-primary" type="submit">{{.SubmitLabel}}</button>
    <a class="btn" href="/domains">Cancel</a>
  </div>
</form>
{{end}}
